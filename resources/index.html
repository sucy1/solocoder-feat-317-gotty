<!doctype html>
<html>
  <head>
    <title>{{ .title }}</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="./css/index.css" />
    <link rel="stylesheet" href="./css/xterm.css" />
    <link rel="stylesheet" href="./css/xterm_customize.css" />
  </head>
  <body>
    <div id="terminal"></div>
    <div id="playback-controls" style="display:none;">
      <button id="playback-toggle">Pause</button>
      <span id="playback-speed-label">Speed:</span>
      <button class="playback-speed-btn" data-speed="0.5">0.5x</button>
      <button class="playback-speed-btn active" data-speed="1">1x</button>
      <button class="playback-speed-btn" data-speed="2">2x</button>
      <button class="playback-speed-btn" data-speed="4">4x</button>
    </div>
    <script src="./auth_token.js"></script>
    <script src="./config.js"></script>
    <script src="./js/gotty-bundle.js"></script>
  </body>
</html>
